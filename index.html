<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <title>Proteus Monitor — VR Lab Dashboard</title>
  <meta name="description" content="ThingSpeak verilerini VR ortaminda gosteren lab paneli" />
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <style>
    /* 2D ekranda (VR'a girmeden once) sol ustte kucuk bilgi kutusu */
    #hud {
      position: fixed; top: 10px; left: 10px; z-index: 9999;
      font-family: monospace; font-size: 13px; color: #fff;
      background: rgba(0,0,0,.55); padding: 8px 12px; border-radius: 8px;
      pointer-events: none; white-space: pre;
    }
  </style>
</head>
<body>
  <div id="hud">Veri bekleniyor...</div>
  <button id="muteHtmlBtn"
          style="position: fixed; top: 10px; right: 10px; z-index: 9999; display: none;
                 padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer;
                 background: #c62828; color: #fff; font-family: monospace; font-size: 14px;">
    Alarmi sustur</button>

  <a-scene background="color: #070b14" renderer="antialias: true"
           fog="type: linear; color: #070b14; near: 10; far: 22"
           cursor="rayOrigin: mouse" raycaster="objects: .clickable">
    <a-assets>
      <canvas id="chartCanvas" width="1024" height="512"></canvas>
      <canvas id="floorCanvas" width="512" height="512"></canvas>
    </a-assets>

    <!-- ====== ODA KABUGU ====== -->
    <!-- karo doseme (canvas dokusu) -->
    <a-plane rotation="-90 0 0" width="12" height="12"
             material="src: #floorCanvas; repeat: 3 3; roughness: 0.85"></a-plane>
    <!-- tavan -->
    <a-plane rotation="90 0 0" position="0 4 0" width="12" height="12" color="#141a28"></a-plane>
    <!-- duvarlar: alt lambri + ust duvar iki tonlu -->
    <a-plane position="0 2.6 -6"  width="12" height="2.8" color="#26314e"></a-plane>
    <a-plane position="0 0.6 -6"  width="12" height="1.2" color="#1a2237"></a-plane>
    <a-box   position="0 1.22 -5.985" width="12" height="0.06" depth="0.03" color="#3d4d77"></a-box>

    <a-plane position="0 2.6 6" rotation="0 180 0" width="12" height="2.8" color="#26314e"></a-plane>
    <a-plane position="0 0.6 6" rotation="0 180 0" width="12" height="1.2" color="#1a2237"></a-plane>
    <a-box   position="0 1.22 5.985" width="12" height="0.06" depth="0.03" color="#3d4d77"></a-box>

    <a-plane position="-6 2.6 0" rotation="0 90 0" width="12" height="2.8" color="#222c46"></a-plane>
    <a-plane position="-6 0.6 0" rotation="0 90 0" width="12" height="1.2" color="#182032"></a-plane>
    <a-box   position="-5.985 1.22 0" rotation="0 90 0" width="12" height="0.06" depth="0.03" color="#3d4d77"></a-box>

    <a-plane position="6 2.6 0" rotation="0 -90 0" width="12" height="2.8" color="#222c46"></a-plane>
    <a-plane position="6 0.6 0" rotation="0 -90 0" width="12" height="1.2" color="#182032"></a-plane>
    <a-box   position="5.985 1.22 0" rotation="0 -90 0" width="12" height="0.06" depth="0.03" color="#3d4d77"></a-box>

    <!-- ====== TAVAN AYDINLATMASI (emissive paneller + isiklar) ====== -->
    <a-box position="-2.5 3.97 -2.5" width="1.8" height="0.05" depth="0.7"
           material="color: #eef3ff; emissive: #dce8ff; emissiveIntensity: 1"></a-box>
    <a-box position="2.5 3.97 -2.5" width="1.8" height="0.05" depth="0.7"
           material="color: #eef3ff; emissive: #dce8ff; emissiveIntensity: 1"></a-box>
    <a-box position="-2.5 3.97 2.5" width="1.8" height="0.05" depth="0.7"
           material="color: #eef3ff; emissive: #dce8ff; emissiveIntensity: 1"></a-box>
    <a-box position="2.5 3.97 2.5" width="1.8" height="0.05" depth="0.7"
           material="color: #eef3ff; emissive: #dce8ff; emissiveIntensity: 1"></a-box>

    <a-light type="ambient" id="ambLight" color="#7e8db0" intensity="0.55"></a-light>
    <a-light type="point" position="0 3.6 -2.5" intensity="0.65" distance="11" color="#f2f6ff"></a-light>
    <a-light type="point" position="0 3.6 2.5"  intensity="0.5"  distance="11" color="#f2f6ff"></a-light>
    <a-light type="point" position="0 2.4 -5"   intensity="0.35" distance="7"  color="#9fc1ff"></a-light>

    <!-- ====== BASLIK TABELASI ====== -->
    <a-box position="0 3.45 -5.93" width="6.4" height="0.55" depth="0.05" color="#0d1322"></a-box>
    <a-text value="PROTEUS LAB  -  CANLI ORTAM IZLEME" position="0 3.45 -5.89" align="center"
            color="#5ef2c8" width="9"></a-text>

    <!-- ====== VERI PANELLERI (on duvarda) ====== -->
    <!-- SICAKLIK -->
    <a-entity position="-2.6 2.25 -5.9">
      <a-plane width="2.3" height="1.7" color="#ffb703"
               material="emissive: #ffb703; emissiveIntensity: 0.25"></a-plane>
      <a-plane width="2.2" height="1.6" position="0 0 0.01" color="#101a30"></a-plane>
      <a-plane width="2.2" height="0.34" position="0 0.63 0.02" color="#1c2a4a"></a-plane>
      <a-text value="SICAKLIK" position="0 0.63 0.03" align="center" color="#ffd166" width="4.4"></a-text>
      <a-text id="tempVal" value="--.-" position="0 -0.02 0.03" align="center" color="#ffb703" width="10"></a-text>
      <a-text value="derece C" position="0 -0.6 0.03" align="center" color="#6b7a99" width="3"></a-text>
    </a-entity>

    <!-- NEM -->
    <a-entity position="0 2.25 -5.9">
      <a-plane width="2.3" height="1.7" color="#48cae4"
               material="emissive: #48cae4; emissiveIntensity: 0.25"></a-plane>
      <a-plane width="2.2" height="1.6" position="0 0 0.01" color="#101a30"></a-plane>
      <a-plane width="2.2" height="0.34" position="0 0.63 0.02" color="#163349"></a-plane>
      <a-text value="NEM" position="0 0.63 0.03" align="center" color="#90e0ef" width="4.4"></a-text>
      <a-text id="humVal" value="--.-" position="0 -0.02 0.03" align="center" color="#48cae4" width="10"></a-text>
      <a-text value="% bagil nem" position="0 -0.6 0.03" align="center" color="#6b7a99" width="3"></a-text>
    </a-entity>

    <!-- BASINC -->
    <a-entity position="2.6 2.25 -5.9">
      <a-plane width="2.3" height="1.7" color="#b5e48c"
               material="emissive: #b5e48c; emissiveIntensity: 0.25"></a-plane>
      <a-plane width="2.2" height="1.6" position="0 0 0.01" color="#101a30"></a-plane>
      <a-plane width="2.2" height="0.34" position="0 0.63 0.02" color="#27411f"></a-plane>
      <a-text value="BASINC" position="0 0.63 0.03" align="center" color="#d8f3a3" width="4.4"></a-text>
      <a-text id="presVal" value="----" position="0 -0.02 0.03" align="center" color="#b5e48c" width="8"></a-text>
      <a-text value="hPa" position="0 -0.6 0.03" align="center" color="#6b7a99" width="3"></a-text>
    </a-entity>

    <!-- durum satiri (panellerin altindaki bant) -->
    <a-box position="0 1.18 -5.93" width="7.6" height="0.3" depth="0.04" color="#0d1322"></a-box>
    <a-text id="statusTxt" value="ThingSpeak verisi bekleniyor..."
            position="0 1.18 -5.89" align="center" color="#90a0c0" width="4.6" wrap-count="70"></a-text>

    <!-- ====== LAB TEZGAHI (on duvar boyunca) ====== -->
    <a-box position="0 0.92 -5.3" width="9" height="0.09" depth="1.1" color="#46557a"
           material="roughness: 0.35; metalness: 0.25"></a-box>
    <a-box position="0 0.45 -5.3" width="8.9" height="0.85" depth="1.0" color="#202a44"></a-box>
    <!-- dolap kapaklari -->
    <a-plane position="-3.2 0.45 -4.79" width="1.9" height="0.7" color="#283659"></a-plane>
    <a-plane position="-1.1 0.45 -4.79" width="1.9" height="0.7" color="#283659"></a-plane>
    <a-plane position="1.1 0.45 -4.79"  width="1.9" height="0.7" color="#283659"></a-plane>
    <a-plane position="3.2 0.45 -4.79"  width="1.9" height="0.7" color="#283659"></a-plane>

    <!-- erlenmayer: cam koni + sivi + boyun -->
    <a-entity position="-3.4 0.97 -5.25">
      <a-cone radius-bottom="0.16" radius-top="0.05" height="0.3" position="0 0.15 0"
              material="color: #bfe3ff; opacity: 0.32; transparent: true"></a-cone>
      <a-cone radius-bottom="0.13" radius-top="0.045" height="0.14" position="0 0.075 0"
              material="color: #37d67a; opacity: 0.75; transparent: true; emissive: #37d67a; emissiveIntensity: 0.3"></a-cone>
      <a-cylinder radius="0.045" height="0.12" position="0 0.36 0"
                  material="color: #bfe3ff; opacity: 0.32; transparent: true"></a-cylinder>
    </a-entity>

    <!-- beher: cam silindir + mavi sivi -->
    <a-entity position="-2.6 0.97 -5.35">
      <a-cylinder radius="0.11" height="0.26" position="0 0.13 0"
                  material="color: #cfe8ff; opacity: 0.28; transparent: true"></a-cylinder>
      <a-cylinder radius="0.095" height="0.13" position="0 0.07 0"
                  material="color: #3aa5ff; opacity: 0.7; transparent: true; emissive: #3aa5ff; emissiveIntensity: 0.25"></a-cylinder>
    </a-entity>

    <!-- deney tupu rafi -->
    <a-entity position="-1.7 0.97 -5.3">
      <a-box width="0.42" height="0.04" depth="0.14" position="0 0.02 0" color="#5a4632"></a-box>
      <a-box width="0.42" height="0.04" depth="0.14" position="0 0.2 0" color="#5a4632"></a-box>
      <a-box width="0.04" height="0.2" depth="0.14" position="-0.19 0.11 0" color="#5a4632"></a-box>
      <a-box width="0.04" height="0.2" depth="0.14" position="0.19 0.11 0" color="#5a4632"></a-box>
      <a-cylinder radius="0.022" height="0.18" position="-0.1 0.16 0"
                  material="color: #ff5d8f; opacity: 0.65; transparent: true"></a-cylinder>
      <a-cylinder radius="0.022" height="0.18" position="0 0.16 0"
                  material="color: #ffd166; opacity: 0.65; transparent: true"></a-cylinder>
      <a-cylinder radius="0.022" height="0.18" position="0.1 0.16 0"
                  material="color: #8ecae6; opacity: 0.65; transparent: true"></a-cylinder>
    </a-entity>

    <!-- mikroskop (stilize) -->
    <a-entity position="2.4 0.97 -5.3">
      <a-cylinder radius="0.13" height="0.04" position="0 0.02 0" color="#2f3a55"></a-cylinder>
      <a-box width="0.06" height="0.3" depth="0.06" position="0 0.18 -0.05" rotation="15 0 0" color="#3d4d77"></a-box>
      <a-cylinder radius="0.035" height="0.18" position="0 0.32 0.02" rotation="25 0 0" color="#202a44"></a-cylinder>
      <a-box width="0.14" height="0.02" depth="0.14" position="0 0.16 0.04" color="#2f3a55"></a-box>
    </a-entity>

    <!-- buchner sisesi (buyuk cam kavanoz) -->
    <a-entity position="3.5 0.97 -5.25">
      <a-cylinder radius="0.14" height="0.34" position="0 0.17 0"
                  material="color: #d8f0ff; opacity: 0.25; transparent: true"></a-cylinder>
      <a-cylinder radius="0.12" height="0.2" position="0 0.1 0"
                  material="color: #b07cf7; opacity: 0.6; transparent: true; emissive: #b07cf7; emissiveIntensity: 0.25"></a-cylinder>
      <a-cylinder radius="0.05" height="0.07" position="0 0.37 0" color="#2f3a55"></a-cylinder>
    </a-entity>

    <!-- ====== ORTA MASA: ARDUINO DUZENEGI + MONITOR ====== -->
    <a-box position="0 0.78 -2.8" width="3.2" height="0.07" depth="1.3" color="#4d5b80"
           material="roughness: 0.3; metalness: 0.3"></a-box>
    <a-cylinder position="-1.4 0.39 -2.45" radius="0.04" height="0.78" color="#2a3349"></a-cylinder>
    <a-cylinder position="1.4 0.39 -2.45"  radius="0.04" height="0.78" color="#2a3349"></a-cylinder>
    <a-cylinder position="-1.4 0.39 -3.15" radius="0.04" height="0.78" color="#2a3349"></a-cylinder>
    <a-cylinder position="1.4 0.39 -3.15"  radius="0.04" height="0.78" color="#2a3349"></a-cylinder>

    <!-- arduino karti + breadboard + sensor -->
    <a-box position="-0.75 0.85 -2.7" width="0.42" height="0.05" depth="0.3" color="#1f7a33"></a-box>
    <a-box position="-0.62 0.89 -2.62" width="0.1" height="0.04" depth="0.08" color="#c0c8d8"></a-box>
    <a-box position="-0.25 0.85 -2.75" width="0.34" height="0.06" depth="0.22" color="#e8eaf0"></a-box>
    <a-box position="-0.25 0.9 -2.75" width="0.07" height="0.04" depth="0.07" color="#b13bb1"></a-box>
    <!-- jumper kablolar -->
    <a-cylinder position="-0.5 0.87 -2.72" rotation="0 0 90" radius="0.008" height="0.22" color="#ff5d5d"></a-cylinder>
    <a-cylinder position="-0.5 0.885 -2.69" rotation="0 0 90" radius="0.008" height="0.22" color="#ffd166"></a-cylinder>
    <a-cylinder position="-0.5 0.9 -2.74" rotation="0 0 90" radius="0.008" height="0.22" color="#48cae4"></a-cylinder>

    <!-- kucuk LCD modulu -->
    <a-box position="0.35 0.9 -2.85" width="0.65" height="0.25" depth="0.05" rotation="-12 0 0" color="#0e2438"></a-box>
    <a-text id="miniLcd" value="--.- C  --%" position="0.35 0.9 -2.82" rotation="-12 0 0"
            align="center" color="#7CFC00" width="1.5"></a-text>

    <!-- masaustu monitor: durum ekrani -->
    <a-entity position="1.05 1.2 -3.0" rotation="0 -14 0">
      <a-box width="0.78" height="0.5" depth="0.04" color="#11151f"></a-box>
      <a-plane id="pcScreen" width="0.7" height="0.42" position="0 0 0.025" color="#04121e"
               material="emissive: #0a2a40; emissiveIntensity: 0.6"></a-plane>
      <a-text id="screenTxt" value="baglaniyor..." position="-0.31 0.05 0.03" align="left"
              color="#5ef2c8" width="1.7" white-space="pre"></a-text>
      <a-cylinder radius="0.035" height="0.16" position="0 -0.32 0" color="#2a3349"></a-cylinder>
      <a-box width="0.3" height="0.02" depth="0.18" position="0 -0.4 0" color="#2a3349"></a-box>
    </a-entity>

    <!-- ====== SOL DUVAR: BUYUK GRAFIK EKRANI ====== -->
    <a-box position="-5.93 2.1 0" rotation="0 90 0" width="4.3" height="2.3" depth="0.06" color="#0d1322"></a-box>
    <a-plane id="chartPlane" position="-5.88 2.1 0" rotation="0 90 0" width="4" height="2"
             material="src: #chartCanvas; shader: flat"></a-plane>
    <a-text value="VERI GECMISI" position="-5.87 3.4 0" rotation="0 90 0" align="center"
            color="#5ef2c8" width="5"></a-text>

    <!-- ====== SAG DUVAR: BEYAZ TAHTA + RAFLAR ====== -->
    <a-box position="5.94 2.2 -2.2" rotation="0 -90 0" width="2.6" height="1.6" depth="0.05" color="#cfd6e4"></a-box>
    <a-text value="LAB NOTLARI:\n- BME280 @ 0x76\n- ThingSpeak ch 2606541\n- 2.4 GHz WiFi!" position="5.9 2.35 -2.2"
            rotation="0 -90 0" align="center" color="#2a3854" width="2.6"></a-text>

    <!-- raflar + renkli siseler -->
    <a-box position="5.9 2.6 1.8" rotation="0 -90 0" width="2.8" height="0.05" depth="0.32" color="#3d4d77"></a-box>
    <a-box position="5.9 1.8 1.8" rotation="0 -90 0" width="2.8" height="0.05" depth="0.32" color="#3d4d77"></a-box>
    <a-cylinder position="5.85 2.78 1.0" radius="0.07" height="0.26" material="color: #ffb703; opacity: 0.75; transparent: true"></a-cylinder>
    <a-cylinder position="5.85 2.78 1.5" radius="0.06" height="0.3"  material="color: #37d67a; opacity: 0.75; transparent: true"></a-cylinder>
    <a-cylinder position="5.85 2.78 2.0" radius="0.08" height="0.22" material="color: #ff5d8f; opacity: 0.75; transparent: true"></a-cylinder>
    <a-cylinder position="5.85 2.78 2.5" radius="0.055" height="0.28" material="color: #48cae4; opacity: 0.75; transparent: true"></a-cylinder>
    <a-box position="5.85 1.95 1.2" rotation="0 -90 0" width="0.22" height="0.26" depth="0.22" color="#b07cf7"></a-box>
    <a-box position="5.85 1.95 1.7" rotation="0 -90 0" width="0.3" height="0.2" depth="0.2" color="#2f3a55"></a-box>
    <a-cylinder position="5.85 1.92 2.3" radius="0.09" height="0.18" material="color: #d8f0ff; opacity: 0.3; transparent: true"></a-cylinder>

    <!-- ====== ARKA DUVAR: KAPI + UYARI ====== -->
    <a-box position="1.8 1.25 5.95" width="1.1" height="2.5" depth="0.06" color="#33415f"></a-box>
    <a-sphere position="1.42 1.2 5.9" radius="0.035" color="#c9d4ea"></a-sphere>
    <a-box position="-1.5 2.3 5.95" width="1.5" height="1.0" depth="0.04" color="#f4d35e"></a-box>
    <a-text value="DIKKAT\nDENEY ALANI" position="-1.5 2.3 5.92" rotation="0 180 0" align="center"
            color="#1a2237" width="3"></a-text>

    <!-- ====== 3D GOSTERGE ISTASYONU (sag on kose) ====== -->
    <!-- gosterge masasi -->
    <a-box position="3.85 0.88 -2.2" width="1.9" height="0.06" depth="0.9" color="#46557a"
           material="roughness: 0.35; metalness: 0.25"></a-box>
    <a-box position="3.85 0.44 -2.2" width="1.8" height="0.82" depth="0.8" color="#202a44"></a-box>
    <a-text value="GOSTERGELER" position="3.85 1.95 -2.2" align="center" color="#5ef2c8" width="3.2"></a-text>

    <!-- termometre: cam tup + yukselen kirmizi sutun -->
    <a-entity position="3.25 0.91 -2.1">
      <a-sphere radius="0.08" position="0 0.08 0"
                material="color: #ff3b30; emissive: #ff3b30; emissiveIntensity: 0.45"></a-sphere>
      <a-cylinder radius="0.04" height="0.78" position="0 0.52 0"
                  material="color: #cfe8ff; opacity: 0.22; transparent: true; depthWrite: false"></a-cylinder>
      <a-cylinder id="thermoCol" radius="0.024" height="0.02" position="0 0.15 0"
                  material="color: #ff3b30; emissive: #ff3b30; emissiveIntensity: 0.5"></a-cylinder>
      <!-- olcek cizgileri: 10 / 20 / 30 / 40 C -->
      <a-box position="0.06 0.32 0" width="0.05" height="0.008" depth="0.008" color="#c9d4ea"></a-box>
      <a-box position="0.06 0.50 0" width="0.05" height="0.008" depth="0.008" color="#c9d4ea"></a-box>
      <a-box position="0.06 0.68 0" width="0.05" height="0.008" depth="0.008" color="#c9d4ea"></a-box>
      <a-box position="0.06 0.86 0" width="0.05" height="0.008" depth="0.008" color="#c9d4ea"></a-box>
      <a-text id="thermoTxt" value="--" position="0.13 0.6 0" align="left" color="#ffb703" width="1.6"></a-text>
    </a-entity>

    <!-- nem tanki: doluluk seviyesi = % nem -->
    <a-entity position="3.85 0.91 -2.3">
      <a-cylinder radius="0.14" height="0.55" position="0 0.275 0"
                  material="color: #d8f0ff; opacity: 0.2; transparent: true; depthWrite: false"></a-cylinder>
      <a-cylinder radius="0.15" height="0.02" position="0 0 0" color="#2f3a55"></a-cylinder>
      <a-cylinder radius="0.15" height="0.02" position="0 0.55 0" color="#2f3a55"></a-cylinder>
      <a-cylinder id="humLiquid" radius="0.12" height="0.02" position="0 0.02 0"
                  material="color: #36b5e0; opacity: 0.8; transparent: true; emissive: #36b5e0; emissiveIntensity: 0.3"></a-cylinder>
      <a-text id="humTxt" value="--" position="0.2 0.3 0" align="left" color="#48cae4" width="1.6"></a-text>
    </a-entity>

    <!-- basinc saati: ibreli kadran (980-1040 hPa) -->
    <a-entity position="4.45 1.35 -2.1">
      <a-box width="0.05" height="0.42" depth="0.04" position="0 -0.31 0" color="#2f3a55"></a-box>
      <a-circle radius="0.28" material="color: #0d1322"></a-circle>
      <a-ring radius-inner="0.27" radius-outer="0.3" color="#b5e48c"></a-ring>
      <a-entity id="presNeedle" rotation="0 0 0">
        <a-box width="0.022" height="0.22" depth="0.01" position="0 0.1 0.012" color="#ff5d5d"></a-box>
      </a-entity>
      <a-circle radius="0.028" position="0 0 0.02" color="#c9d4ea"></a-circle>
      <a-text id="presTxt" value="----" position="0 -0.15 0.02" align="center" color="#b5e48c" width="1.8"></a-text>
      <a-text value="980" position="-0.2 -0.2 0.02" align="center" color="#6b7a99" width="1"></a-text>
      <a-text value="1040" position="0.2 -0.2 0.02" align="center" color="#6b7a99" width="1"></a-text>
    </a-entity>

    <!-- ====== ALARM SIRENI (tavan) + UYARI YAZISI ====== -->
    <a-entity position="0 3.85 -3.5">
      <a-cylinder radius="0.13" height="0.06" color="#2f3a55"></a-cylinder>
      <a-sphere id="sirenDome" radius="0.11" theta-length="90" position="0 -0.02 0" rotation="180 0 0"
                material="color: #ff2222; emissive: #ff2222; emissiveIntensity: 0.12; opacity: 0.85; transparent: true"></a-sphere>
      <a-light id="sirenLight" type="point" intensity="0" distance="10" color="#ff3030" position="0 -0.2 0"></a-light>
    </a-entity>
    <a-text id="alarmTxt" value="!!! ALARM - SICAKLIK YUKSEK !!!" position="0 1.72 -4.4"
            align="center" color="#ff4040" width="8" visible="false"></a-text>

    <!-- alarm susturma butonu (masanin on kenarinda, tiklanabilir) -->
    <a-entity position="0.62 0.85 -2.45">
      <a-box id="muteBase" class="clickable" width="0.2" height="0.05" depth="0.2"
             position="0 0.02 0" color="#39455f"></a-box>
      <a-cylinder id="muteBtn" class="clickable" radius="0.06" height="0.05" position="0 0.07 0"
                  material="color: #a33333; emissive: #a33333; emissiveIntensity: 0.1"></a-cylinder>
      <a-text id="muteLbl" value="ALARM SUSTUR" position="0 0.04 0.12" rotation="-35 0 0"
              align="center" color="#c9d4ea" width="1.4"></a-text>
    </a-entity>

    <!-- kamera: VR'da kafa takibi, masaustunde WASD + fare; VR kumandalari icin lazer -->
    <a-entity position="0 0 1.6">
      <a-camera wasd-controls="acceleration: 30" look-controls></a-camera>
      <a-entity laser-controls="hand: right" raycaster="objects: .clickable"></a-entity>
      <a-entity laser-controls="hand: left" raycaster="objects: .clickable"></a-entity>
    </a-entity>
  </a-scene>

  <script>
    const CHANNEL  = "2606541";
    const READ_KEY = "9LV4O9Y37Z4C7HNW";
    const REFRESH_MS = 20000; // 20 sn'de bir yenile

    const lastUrl    = `https://api.thingspeak.com/channels/${CHANNEL}/feeds/last.json?api_key=${READ_KEY}`;
    const historyUrl = `https://api.thingspeak.com/channels/${CHANNEL}/feeds.json?api_key=${READ_KEY}&results=60`;

    // Alarm esigi (derece C). URL'e ?th=25 ekleyerek degistirilebilir (test icin pratik).
    const TEMP_ALARM = (() => {
      const v = parseFloat(new URLSearchParams(location.search).get("th"));
      return isNaN(v) ? 30 : v;
    })();

    function setText(id, value) {
      document.getElementById(id).setAttribute("value", value);
    }

    // sicakliga gore ortam isigi: serin=mavi, normal=notr, sicak=turuncu/kirmizi
    function moodColor(t) {
      if (t <= 18) return "#6d93e8";
      if (t <= 24) return "#7e8db0";
      if (t <= 28) return "#c79b6a";
      return "#d4705f";
    }

    function fmtAge(created) {
      const ageMin = Math.round((Date.now() - new Date(created).getTime()) / 60000);
      if (ageMin < 1)    return "az once";
      if (ageMin < 60)   return ageMin + " dk once";
      if (ageMin < 1440) return Math.round(ageMin / 60) + " saat once";
      return Math.round(ageMin / 1440) + " gun once";
    }

    // ====== 3D GOSTERGELER ======
    function updateGauges(t, h, p) {
      // termometre: 0-40 C -> 0-0.72 m sutun
      const tc = Math.min(Math.max(t, 0), 40);
      const th = Math.max(0.02, (tc / 40) * 0.72);
      const col = document.getElementById("thermoCol");
      col.setAttribute("height", th);
      col.setAttribute("position", `0 ${(0.14 + th / 2).toFixed(3)} 0`);
      setText("thermoTxt", t.toFixed(1) + " C");

      // nem tanki: %0-100 -> 0-0.5 m doluluk
      const hh = Math.max(0.02, (Math.min(h, 100) / 100) * 0.5);
      const liq = document.getElementById("humLiquid");
      liq.setAttribute("height", hh);
      liq.setAttribute("position", `0 ${(0.02 + hh / 2).toFixed(3)} 0`);
      setText("humTxt", h.toFixed(0) + " %");

      // basinc saati: 980-1040 hPa -> +120..-120 derece ibre
      const pc = Math.min(Math.max(p, 980), 1040);
      const rot = 120 - ((pc - 980) / 60) * 240;
      document.getElementById("presNeedle").setAttribute("rotation", `0 0 ${rot.toFixed(1)}`);
      setText("presTxt", p.toFixed(1));
    }

    // ====== ALARM ======
    let alarmActive = false, alarmMuted = false, sirenPhase = false, audioCtx = null;
    let lastTemp = null;

    function beep(freq) {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") return; // ilk tiklamada acilir
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = "square"; o.frequency.value = freq;
        g.gain.value = 0.04; o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 0.18);
      } catch (e) { /* ses olmazsa gorsel alarm yeter */ }
    }
    document.addEventListener("click", () => {
      if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
    });

    function silenceSiren() {
      document.getElementById("sirenLight").setAttribute("intensity", 0);
      document.getElementById("sirenDome").setAttribute("material", "emissiveIntensity", 0.12);
      document.getElementById("alarmTxt").setAttribute("visible", false);
    }

    // buton ve HTML dugmesinin gorunumunu duruma gore guncelle
    function applyMuteVisual() {
      const btn = document.getElementById("muteBtn");
      btn.setAttribute("material", alarmMuted
        ? "color: #37d67a; emissive: #37d67a; emissiveIntensity: 0.5"
        : (alarmActive ? "color: #ff2222; emissive: #ff2222; emissiveIntensity: 0.7"
                       : "color: #a33333; emissive: #a33333; emissiveIntensity: 0.1"));
      setText("muteLbl", alarmMuted ? "SUSTURULDU" : "ALARM SUSTUR");
      const hb = document.getElementById("muteHtmlBtn");
      hb.style.display = alarmActive ? "block" : "none";
      hb.textContent = alarmMuted ? "Alarmi tekrar ac" : "Alarmi sustur";
      hb.style.background = alarmMuted ? "#2e7d32" : "#c62828";
    }

    // odanin isigini mevcut duruma gore ayarla
    function refreshAmbient() {
      if (lastTemp === null) return;
      const loud = alarmActive && !alarmMuted;
      const amb = document.getElementById("ambLight");
      amb.setAttribute("color", loud ? "#e0392b" : moodColor(lastTemp));
      amb.setAttribute("intensity", loud ? 0.75 : 0.55);
    }

    function toggleMute() {
      if (!alarmActive) return; // alarm yokken butonun isi yok
      alarmMuted = !alarmMuted;
      if (alarmMuted) silenceSiren();
      applyMuteVisual();
      refreshAmbient();
    }

    function setAlarm(on) {
      if (alarmActive === on) { applyMuteVisual(); return; }
      alarmActive = on;
      if (!on) { alarmMuted = false; silenceSiren(); } // alarm bitince susturma sifirlanir
      document.getElementById("alarmTxt").setAttribute("visible", on && !alarmMuted);
      applyMuteVisual();
    }

    // siren yanip sonme dongusu (alarm aktif ve susturulmamisken 0.5 sn'de bir)
    setInterval(() => {
      if (!alarmActive || alarmMuted) return;
      sirenPhase = !sirenPhase;
      document.getElementById("sirenLight").setAttribute("intensity", sirenPhase ? 1.8 : 0.15);
      document.getElementById("sirenDome").setAttribute("material", "emissiveIntensity", sirenPhase ? 1 : 0.15);
      document.getElementById("alarmTxt").setAttribute("visible", sirenPhase);
      beep(sirenPhase ? 880 : 660);
    }, 500);

    // tiklama baglantilari: sahnedeki buton + ekran kosesindeki dugme
    document.getElementById("muteBtn").addEventListener("click", toggleMute);
    document.getElementById("muteBase").addEventListener("click", toggleMute);
    document.getElementById("muteHtmlBtn").addEventListener("click", toggleMute);

    // karo doseme dokusunu bir kez ciz
    function drawFloor() {
      const cv = document.getElementById("floorCanvas");
      const ctx = cv.getContext("2d");
      const N = 8, S = cv.width / N;
      for (let i = 0; i < N; i++) {
        for (let j = 0; j < N; j++) {
          const even = (i + j) % 2 === 0;
          ctx.fillStyle = even ? "#222b42" : "#1b2336";
          ctx.fillRect(i * S, j * S, S, S);
          ctx.strokeStyle = "#141a2a"; ctx.lineWidth = 3;
          ctx.strokeRect(i * S, j * S, S, S);
        }
      }
    }

    async function updateLive() {
      try {
        const r = await fetch(lastUrl);
        const d = await r.json();
        const t = parseFloat(d.field1), h = parseFloat(d.field2), p = parseFloat(d.field3);

        setText("tempVal", t.toFixed(1));
        setText("humVal",  h.toFixed(1));
        setText("presVal", p.toFixed(1));
        setText("miniLcd", t.toFixed(1) + " C  " + h.toFixed(0) + "%");
        setText("screenTxt", "PROTEUS v1\nT: " + t.toFixed(2) + " C\nRH: " + h.toFixed(2) + " %\nP: " + p.toFixed(1) + " hPa");

        const when  = new Date(d.created_at).toLocaleString("tr-TR");
        const stale = (Date.now() - new Date(d.created_at).getTime()) > 10 * 60 * 1000;
        setText("statusTxt",
          "Son veri: " + when + " (" + fmtAge(d.created_at) + ")" + (stale ? "  [VERI ESKI - cihaz kapali olabilir]" : ""));

        updateGauges(t, h, p);
        lastTemp = t;
        setAlarm(t >= TEMP_ALARM);
        refreshAmbient(); // alarm varken oda kirmizi, susturulduysa/normaldeyse sicaklik tonu

        document.getElementById("hud").textContent =
          `Sicaklik: ${t.toFixed(1)} C\nNem:      ${h.toFixed(1)} %\nBasinc:   ${p.toFixed(1)} hPa\nSon veri: ${fmtAge(d.created_at)}` +
          (alarmActive
            ? `\n*** ALARM: ${TEMP_ALARM} C esigi asildi!${alarmMuted ? " (susturuldu)" : ""} ***`
            : `\nAlarm esigi: ${TEMP_ALARM} C`);
      } catch (e) {
        setText("statusTxt", "Veri alinamadi - baglanti hatasi");
        document.getElementById("hud").textContent = "Veri alinamadi: " + e.message;
      }
    }

    async function updateChart() {
      try {
        const r = await fetch(historyUrl);
        const d = await r.json();
        const pts = d.feeds
          .map(f => ({ t: parseFloat(f.field1), at: f.created_at }))
          .filter(p => !isNaN(p.t));
        if (!pts.length) return;

        const cv  = document.getElementById("chartCanvas");
        const ctx = cv.getContext("2d");
        const W = cv.width, H = cv.height, PAD = 70;

        ctx.fillStyle = "#101828";
        ctx.fillRect(0, 0, W, H);

        const vals = pts.map(p => p.t);
        const min = Math.min(...vals) - 0.5, max = Math.max(...vals) + 0.5;
        const x = i  => PAD + (i / (pts.length - 1 || 1)) * (W - 2 * PAD);
        const y = v  => H - PAD - ((v - min) / (max - min)) * (H - 2 * PAD);

        // eksen cizgileri + degerler
        ctx.strokeStyle = "#2a3a55"; ctx.fillStyle = "#7d8db0";
        ctx.font = "24px monospace"; ctx.lineWidth = 1;
        for (let i = 0; i <= 4; i++) {
          const v = min + (i / 4) * (max - min), yy = y(v);
          ctx.beginPath(); ctx.moveTo(PAD, yy); ctx.lineTo(W - PAD, yy); ctx.stroke();
          ctx.fillText(v.toFixed(1), 5, yy + 8);
        }

        // sicaklik cizgisi + altinda hafif dolgu
        ctx.beginPath();
        pts.forEach((p, i) => i ? ctx.lineTo(x(i), y(p.t)) : ctx.moveTo(x(0), y(p.t)));
        ctx.strokeStyle = "#ffb703"; ctx.lineWidth = 4; ctx.stroke();
        ctx.lineTo(x(pts.length - 1), H - PAD); ctx.lineTo(x(0), H - PAD); ctx.closePath();
        ctx.fillStyle = "rgba(255, 183, 3, 0.12)"; ctx.fill();

        ctx.fillStyle = "#8ecae6"; ctx.font = "28px monospace";
        ctx.fillText("Sicaklik gecmisi (son " + pts.length + " olcum, C)", PAD, 40);

        // a-frame dokusunu tazele
        const mesh = document.getElementById("chartPlane").getObject3D("mesh");
        if (mesh && mesh.material.map) mesh.material.map.needsUpdate = true;
      } catch (e) { /* grafik guncellenemezse paneller calismaya devam etsin */ }
    }

    function refresh() { updateLive(); updateChart(); }

    // sahne hazir olunca basla, sonra periyodik yenile
    document.querySelector("a-scene").addEventListener("loaded", () => {
      drawFloor();
      // doseme dokusunu tazele (canvas sahne yuklenince cizildi)
      const floor = document.querySelector('[material*="floorCanvas"]');
      if (floor) {
        const m = floor.getObject3D("mesh");
        if (m && m.material.map) m.material.map.needsUpdate = true;
      }
      refresh();
    });
    setInterval(refresh, REFRESH_MS);
  </script>
</body>
</html>
